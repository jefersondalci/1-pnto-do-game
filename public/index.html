<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tennis Trader</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
      input, select, button { font-family: inherit; font-size: 14px; border-radius: 8px; border: 1px solid #ddd; padding: 8px 12px; outline: none; }
      input:focus, select:focus { border-color: #2d6a4f; box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
      button { background: #2d6a4f; color: white; border: none; cursor: pointer; transition: background 0.2s; }
      button:hover { background: #1a5c38; }
      button:disabled { background: #aaa; cursor: default; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
